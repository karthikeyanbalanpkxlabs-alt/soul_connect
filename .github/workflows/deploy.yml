name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /root/soul_connect
            git fetch origin main
            git reset --hard origin/main

            docker build -t soulconnect-backend:latest ./SoulConnect_BACK_END
            docker stop soulconnect-backend || true
            docker rm soulconnect-backend || true
            docker run -d \
              --name soulconnect-backend \
              --restart unless-stopped \
              --env-file ./SoulConnect_BACK_END/.env \
              -p 3000:3000 \
              -v soulconnect-backend-uploads:/app/uploads \
              --add-host=host.docker.internal:host-gateway \
              soulconnect-backend:latest

            docker build -t soulconnect-frontend:latest ./SoulConnect_FRONT_END_Next
            docker stop soulconnect-frontend || true
            docker rm soulconnect-frontend || true
            docker run -d \
              --name soulconnect-frontend \
              --restart unless-stopped \
              -p 8080:80 \
              soulconnect-frontend:latest

            docker image prune -f
